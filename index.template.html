<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="${SITE_DESCRIPTION}">
    <title>${SITE_TITLE}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="${SITE_TITLE}">
    <meta property="og:description" content="${SITE_DESCRIPTION}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="${SITE_URL}">
    <meta property="og:image" content="${OG_IMAGE_URL}">
    <meta property="og:image:width" content="${OG_IMAGE_WIDTH}">
    <meta property="og:image:height" content="${OG_IMAGE_HEIGHT}">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="${SITE_TITLE}">
    <meta name="twitter:description" content="${SITE_DESCRIPTION}">
    <meta name="twitter:image" content="${OG_IMAGE_URL}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#home">
                <i class="fab fa-github"></i> Portfolio
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#repositories">Repositories</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#contact">Contact</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm ms-2" id="darkModeToggle" title="Toggle dark mode">
                            <i class="fas fa-moon"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm ms-2" id="layoutToggle" title="Toggle layout">
                            <i class="fas fa-bars"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Profile Section (populated by script.js from profile.json) -->
    <section id="profile" class="py-5 bg-light">
        <div class="container">
            <div class="row text-center">
                <div class="col-md-12">
                    <img id="profileAvatar" alt="Profile" class="rounded-circle mb-3" width="150" height="150">
                    <h1 class="mb-2" id="profileName"></h1>
                    <p class="lead mb-3" id="profileTitle"></p>
                    <p class="text-muted" id="profileBio"></p>

                    <!-- Social Links -->
                    <div class="social-links mt-4" id="profileSocialLinks"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Search & Filter Section -->
    <section id="filters" class="py-4 bg-white sticky-top">
        <div class="container">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="searchInput" class="form-control"
                           placeholder="Search repositories...">
                </div>
                <div class="col-md-3">
                    <select id="technologyFilter" class="form-select">
                        <option value="">All Technologies</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select id="sortBy" class="form-select">
                        <option value="updated">Latest Updated</option>
                        <option value="created">Recently Created</option>
                        <option value="stars">Most Stars</option>
                        <option value="name">Name (A-Z)</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary w-100" id="clearFiltersBtn">
                        <i class="fas fa-redo"></i> Clear
                    </button>
                </div>
            </div>
            <div class="mt-2">
                <small class="text-muted">
                    <span id="resultCount">Loading repositories...</span>
                </small>
            </div>
        </div>
    </section>

    <!-- Repositories Section -->
    <section id="repositories" class="py-5">
        <div class="container">
            <h2 class="mb-4" id="repositoriesHeading"></h2>

            <!-- Card View (Default) -->
            <div id="cardView" class="row g-4">
                <!-- Populated by JavaScript -->
            </div>

            <!-- Table View (Hidden by default) -->
            <div id="tableView" class="d-none">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Language</th>
                                <th>⭐ Stars</th>
                                <th>Updated</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="d-none text-center py-5">
                <i class="fas fa-search fa-3x text-muted mb-3"></i>
                <h4>No repositories found</h4>
                <p class="text-muted">Try adjusting your search or filters</p>
            </div>
        </div>
    </section>

    <!-- About Section (populated by script.js from profile.json) -->
    <section id="about" class="py-5 bg-light">
        <div class="container">
            <h2 class="mb-4" id="aboutHeading"></h2>
            <div class="row">
                <div class="col-md-8">
                    <div id="aboutParagraphs"></div>
                    <ul id="aboutHighlights"></ul>
                </div>
                <div class="col-md-4">
                    <h5 id="aboutSkillsHeading"></h5>
                    <div class="tags mb-3" id="aboutSkills"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section (populated by script.js from profile.json) -->
    <section id="contact" class="py-5">
        <div class="container">
            <h2 class="mb-4" id="contactHeading"></h2>
            <div class="row">
                <div class="col-md-8">
                    <p id="contactIntro"></p>
                    <ul class="list-unstyled" id="contactChannels"></ul>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer (populated by script.js from profile.json) -->
    <footer class="bg-dark text-white py-4 mt-5" data-bs-theme="dark">
        <div class="container text-center">
            <p class="mb-2" id="footerCopyright"></p>
            <small class="text-muted">
                Last updated: <span id="lastUpdated">Loading...</span> |
                <a id="footerSourceLink" target="_blank" class="text-muted"></a>
            </small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
