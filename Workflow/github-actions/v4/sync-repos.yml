name: Sync GitHub Repos Daily

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:      # Manual trigger button in GitHub UI

jobs:
  sync-repos:
    # The last step of this job pushes a commit to main. Without this guard,
    # that push would immediately re-trigger the job via the push event above.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run sync script
        id: sync
        env:
          REPOS_PAT: ${{ secrets.REPOS_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: bash scripts/sync.sh

      - name: Commit and push changes
        env:
          COMMIT_MESSAGE: ${{ steps.sync.outputs.commit_message }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add repos.json repos-previous.json profile.json index.html

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push
